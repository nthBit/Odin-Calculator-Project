<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="./script.js"></script>
    <link rel="stylesheet" href="./styles.css">
    <title>Odin Calculator</title>
</head>
<body>

    <div class="frame">
        <div class="screen">
            300
        </div>
        <div class="controls">
            <div class="clear">
                <button>C</button>
            </div>
            <div class="main-panel">
                <div class="wrap-keys">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>

                    <button>4</button>
                    <button>5</button>
                    <button>6</button>

                    <button>1</button>
                    <button>2</button>
                    <button>3</button>

                    <button>0</button>
                    <button>.</button>
                    <button>=</button>
                </div>
                <div class="operators">
                    <button>+</button>
                    <button>-</button>
                    <button>×</button>
                    <button>÷</button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
